# Personale Artificiale — Docker Stack
# Deploy: cp .env.example .env && docker compose up -d --build

services:
  nginx:
    image: nginx:alpine
    ports:
      # Espone Personale Artificiale solo in loopback per convivere sulla stessa VM
      # con altri siti/container. Il reverse proxy host pubblico deve inoltrare:
      # - personaleartificiale.it / www.personaleartificiale.it -> 127.0.0.1:${PA_HTTP_PORT:-8081}
      # - app.personaleartificiale.it -> 127.0.0.1:${PA_HTTP_PORT:-8081}
      - "127.0.0.1:${PA_HTTP_PORT:-8081}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      app:
        condition: service_healthy
      www:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pa-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://pa:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/personale_artificiale
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      EVOLUTION_API_URL: http://evolution:8080
      APP_URL: ${APP_URL:-https://app.personaleartificiale.it}
      WWW_URL: ${WWW_URL:-https://www.personaleartificiale.it}
      UPLOADS_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks:
      - pa-net
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/.run
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  www:
    build:
      context: ./www
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    networks:
      - pa-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: personale_artificiale
      POSTGRES_USER: pa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pa -d personale_artificiale"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - pa-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - pa-net

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    networks:
      - pa-net

  evolution:
    image: evoapicloud/evolution-api:latest
    env_file:
      - path: .env
        required: false
    environment:
      SERVER_PORT: 8080
      SERVER_URL: http://evolution:8080
      CORS_ORIGIN: "*"
      CORS_METHODS: GET,POST,PUT,DELETE
      CORS_CREDENTIALS: "true"
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?set EVOLUTION_API_KEY in .env}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://pa:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/evolution?schema=evolution_api
      DATABASE_CONNECTION_CLIENT_NAME: personale_artificiale
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_DELETE_MESSAGE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      LOG_LEVEL: ERROR,WARN,INFO,LOG
      LOG_BAILEYS: error
      QRCODE_LIMIT: 30
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pa-net

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  app-uploads:
  app-logs:
  evolution-instances:

networks:
  pa-net:
    driver: bridge
