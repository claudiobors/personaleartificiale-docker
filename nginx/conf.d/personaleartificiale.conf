upstream personale_artificiale_public {
    server www:3000;
    keepalive 16;
}

upstream personale_artificiale_app {
    server app:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name personaleartificiale.it www.personaleartificiale.it;
    return 301 https://personaleartificiale.it$request_uri;
}

server {
    listen 80;
    server_name app.personaleartificiale.it;
    return 301 https://app.personaleartificiale.it$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name personaleartificiale.it www.personaleartificiale.it;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    add_header X-Personale-Artificiale-Site "public" always;

    location / {
        proxy_pass http://personale_artificiale_public;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name app.personaleartificiale.it;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    add_header X-Personale-Artificiale-Site "app" always;
    client_max_body_size 50M;

    location / {
        proxy_pass http://personale_artificiale_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}
