map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream pa_app {
  server app:3000;
}

upstream pa_www {
  server www:3000;
}

server {
  listen 80;
  server_name app.personaleartificiale.it;

  client_max_body_size 20m;
  add_header X-Personale-Artificiale-Site app always;

  location / {
    proxy_pass http://pa_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
  }
}

server {
  listen 80 default_server;
  server_name personaleartificiale.it www.personaleartificiale.it;

  add_header X-Personale-Artificiale-Site public always;

  location / {
    proxy_pass http://pa_www;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
  }
}
